<!doctype html>
<html lang="en">
    <head>
        <link rel="icon" type="image/x-icon" href="./../favicon.ico" />
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="https://jukeebox.github.io/icon_shadow_192.png"
        />
        <meta
            name="keywords"
            content="chiptune, instrumental, music, melody, composition, tool, square wave, NES, NSF, BeepBox"
        />
        <meta name="theme-color" content="#e970cb" />
        <meta property="og:image" content="../icon_maskable_192.png" />
        <meta name="format-detection" content="telephone=no" />
        <meta
            property="og:image"
            content="https://jukeebox.github.io/icon_shadow_192.png"
        />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="./../apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./../icon_32.png"
        />
        <link
            href="https://fonts.googleapis.com/css?family=Roboto"
            rel="stylesheet"
            rel="stylesheet"
            media="none"
            onload="if (this.media != 'all') this.media = 'all';"
        />
        <!-- this is a trick to load CSS asynchronously. -->
        <meta name="robots" content="noindex, nofollow" />
        <style>
            html {
                width: 100vw;
                font-family: "Roboto", sans-serif;
                color: var(--primary-text, white);
                align-items: center;
            }

            html,
            body {
                height: 100%;
                overflow: hidden;
                display: flex;
                margin: 0;
                padding: 0;
                background: var(--page-margin, black);
            }

            body {
                width: 100vw;
                flex-direction: column;
                align-items: stretch;
            }
        </style>
    </head>
    <body></body>
</html>
